function solve(g){
  let out=g.map(r=>[...r]);let R=g.length,C=g[0].length;
  let colors=[];
  for(let i=0;i<Math.min(R,C);i++){let v=g[i][i];if(v===0||v===1)break;colors.push(v);}
  let top,left,bot,right;
  outer1:for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(g[r][c]===1){top=r;left=c;break outer1;}
  outer2:for(let r=R-1;r>=0;r--)for(let c=C-1;c>=0;c--)if(g[r][c]===1){bot=r;right=c;break outer2;}
  for(let l=0;l<colors.length;l++){
    let r1=top+1+l,r2=bot-1-l,c1=left+1+l,c2=right-1-l;
    if(r1>r2||c1>c2)break;
    for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++)out[r][c]=colors[l];
  }
  return out;
}
