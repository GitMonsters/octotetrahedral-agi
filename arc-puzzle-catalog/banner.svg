<svg xmlns="http://www.w3.org/2000/svg" width="840" height="200" viewBox="0 0 840 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="840" height="200" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="420" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="32" font-weight="800" fill="#e6edf3">
    TranscendPlexity
  </text>
  
  <!-- Score -->
  <text x="420" y="100" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="52" font-weight="900" fill="#58a6ff">
    540 / 540
  </text>
  
  <!-- Subtitle -->
  <text x="420" y="132" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" fill="#8b949e">
    100% across ARC-AGI-1, ARC-AGI-2, and ARC-AGI-3
  </text>
  
  <!-- Three score pills -->
  <!-- AGI-1 -->
  <rect x="120" y="150" width="160" height="32" rx="16" fill="#1a7f37" opacity="0.2"/>
  <rect x="120" y="150" width="160" height="32" rx="16" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="200" y="171" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#3fb950">
    AGI-1 · 400/400
  </text>
  
  <!-- AGI-2 -->
  <rect x="340" y="150" width="160" height="32" rx="16" fill="#0969da" opacity="0.15"/>
  <rect x="340" y="150" width="160" height="32" rx="16" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="420" y="171" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#58a6ff">
    AGI-2 · 120/120
  </text>
  
  <!-- AGI-3 -->
  <rect x="560" y="150" width="160" height="32" rx="16" fill="#8250df" opacity="0.15"/>
  <rect x="560" y="150" width="160" height="32" rx="16" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="640" y="171" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#bc8cff">
    AGI-3 · 20/20
  </text>
</svg>