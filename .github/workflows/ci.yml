name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy tiktoken pyyaml tqdm pytest ruff

      - name: Lint with ruff
        run: |
          ruff check model.py config.py cognition.py inference.py --ignore E501

      - name: Check imports
        run: |
          python -c "import model; print(f'✓ model.py — {model.OctoTetrahedralModel}')"
          python -c "import config; print('✓ config.py')"
          python -c "import cognition; print('✓ cognition.py')"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No test suite yet"

      - name: Verify model architecture
        run: |
          python -c "
          import torch
          from model import OctoTetrahedralModel
          from config import ModelConfig
          cfg = ModelConfig()
          m = OctoTetrahedralModel(cfg)
          params = sum(p.numel() for p in m.parameters())
          print(f'✓ Model loads: {params:,} parameters')
          "
