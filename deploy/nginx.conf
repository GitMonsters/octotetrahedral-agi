# OctoTetrahedral AGI — Nginx Reverse Proxy with TLS
#
# Provides:
#   - Let's Encrypt TLS termination (HTTPS on 443)
#   - Reverse proxy to FastAPI on localhost:8000
#   - Rate limiting (10 req/s per IP)
#   - Security headers
#
# Setup:
#   1. Replace YOUR_DOMAIN with your actual domain
#   2. Run: certbot --nginx -d YOUR_DOMAIN
#   3. Copy to: /etc/nginx/sites-available/octotetrahedral
#   4. ln -s /etc/nginx/sites-available/octotetrahedral /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx

# Rate limiting zone: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream octotetrahedral {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # TLS (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Health check — no rate limit, no auth
    location /health {
        proxy_pass http://octotetrahedral;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Metrics — restrict to localhost/internal
    location /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://octotetrahedral;
    }

    # API endpoints — rate limited
    location / {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://octotetrahedral;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # Large model responses
        client_max_body_size 10M;
    }

    # Swagger docs
    location /docs {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://octotetrahedral;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://octotetrahedral;
    }
}
